<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rafael · Sleep</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f6f4f0; --surface: #ffffff; --ink: #18181b; --mid: #71717a;
  --faint: #e4e4e7; --nap: #d97706; --night: #4f46e5; --red: #dc2626; --r: 14px;
}
body { background:var(--bg); color:var(--ink); font-family:'Instrument Sans',sans-serif; min-height:100vh; font-size:15px; -webkit-font-smoothing:antialiased; }
.wrap { max-width:440px; margin:0 auto; padding:28px 16px 100px; }

/* Header */
.hdr { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:28px; }
.hdr-name { font-family:'Instrument Serif',serif; font-size:1.75rem; line-height:1; }
.hdr-name em { font-style:italic; color:var(--mid); }
.hdr-date { font-size:0.72rem; color:var(--mid); text-align:right; line-height:1.6; }
.hdr-clock { font-size:1rem; color:var(--ink); font-weight:500; }

/* Section heading */
.sh { font-size:0.62rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--mid); margin:20px 0 8px; }

/* Prediction banner */
.pred-banner { background:var(--ink); color:#fff; border-radius:var(--r); padding:18px 20px; margin-bottom:12px; }
.pred-banner.empty { background:var(--faint); color:var(--mid); }
.pred-label { font-size:0.6rem; text-transform:uppercase; letter-spacing:0.1em; opacity:.5; margin-bottom:10px; }
.pred-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.pi-lbl { font-size:0.6rem; text-transform:uppercase; letter-spacing:0.08em; opacity:.4; margin-bottom:3px; }
.pi-val { font-family:'Instrument Serif',serif; font-size:1.25rem; line-height:1.15; }
.amber { color:#fbbf24; } .green { color:#86efac; }

/* Nap window */
.nap-win { background:#fffbeb; border:1px solid #fde68a; border-radius:var(--r); padding:14px 18px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
.nw-lbl { font-size:0.62rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--nap); margin-bottom:3px; }
.nw-val { font-family:'Instrument Serif',serif; font-size:1.15rem; color:#92400e; }

/* Timer */
.timer-card { background:var(--surface); border:1px solid var(--faint); border-radius:var(--r); padding:18px; margin-bottom:12px; transition:border-color .2s, box-shadow .2s; }
.timer-card.act-nap   { border-color:var(--nap);   box-shadow:0 0 0 3px rgba(217,119,6,.1); }
.timer-card.act-night { border-color:var(--night); box-shadow:0 0 0 3px rgba(79,70,229,.1); }
.ttabs { display:flex; gap:6px; margin-bottom:16px; }
.ttab { flex:1; padding:8px; border-radius:9px; border:1px solid var(--faint); background:none; cursor:pointer; font-family:'Instrument Sans',sans-serif; font-size:0.74rem; font-weight:500; color:var(--mid); transition:all .15s; }
.ttab.on-nap   { background:#fef3c7; border-color:#fde68a; color:#92400e; }
.ttab.on-night { background:#ede9fe; border-color:#c4b5fd; color:#3730a3; }
.tface { text-align:center; margin-bottom:16px; }
.tdigits { font-family:'Instrument Serif',serif; font-size:4rem; letter-spacing:.02em; line-height:1; color:var(--ink); transition:color .25s; }
.tdigits.run-nap   { color:var(--nap); }
.tdigits.run-night { color:var(--night); }
.colon.blink { animation:blink 1s step-end infinite; }
@keyframes blink { 50%{opacity:.15} }
.tsince { font-size:0.62rem; color:var(--mid); margin-top:5px; min-height:14px; }
.t-adjust { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.t-adjust label { font-size:0.6rem; text-transform:uppercase; letter-spacing:.08em; color:var(--mid); white-space:nowrap; }
.t-adjust input { flex:1; padding:7px 10px; border:1px solid var(--faint); border-radius:8px; font-family:'Instrument Sans',sans-serif; font-size:0.85rem; color:var(--ink); background:var(--bg); outline:none; transition:border-color .15s; }
.t-adjust input:focus { border-color:var(--ink); }
.tbtns { display:flex; gap:8px; }
.btn-go { flex:1; padding:12px; border-radius:10px; border:none; cursor:pointer; font-family:'Instrument Sans',sans-serif; font-size:0.76rem; font-weight:500; transition:all .15s; background:var(--ink); color:#fff; }
.btn-go.nap   { background:var(--nap); }
.btn-go.night { background:var(--night); }
.btn-go.stop  { background:#fee2e2; color:var(--red); }
.btn-go:hover { opacity:.85; }
.btn-sv { padding:12px 16px; border-radius:10px; border:1px solid var(--faint); background:var(--surface); color:var(--ink); cursor:pointer; font-family:'Instrument Sans',sans-serif; font-size:0.76rem; font-weight:500; transition:all .15s; display:none; }
.btn-sv.show { display:block; }
.btn-sv:hover { background:var(--faint); }

/* Manual card */
.manual-card { background:var(--surface); border:1px solid var(--faint); border-radius:var(--r); padding:16px; margin-bottom:12px; }
.type-row { display:flex; gap:6px; margin-bottom:14px; }
.tpill { flex:1; padding:8px; border-radius:8px; border:1px solid var(--faint); background:none; cursor:pointer; font-family:'Instrument Sans',sans-serif; font-size:0.74rem; font-weight:500; color:var(--mid); transition:all .15s; }
.tpill.nap   { background:#fef3c7; border-color:#fde68a; color:#92400e; }
.tpill.night { background:#ede9fe; border-color:#c4b5fd; color:#3730a3; }
.frow { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
.field label { display:block; font-size:0.6rem; text-transform:uppercase; letter-spacing:.08em; color:var(--mid); margin-bottom:4px; }
.field input { width:100%; padding:9px 10px; border:1px solid var(--faint); border-radius:8px; font-family:'Instrument Sans',sans-serif; font-size:0.85rem; color:var(--ink); background:var(--bg); outline:none; transition:border-color .15s; }
.field input:focus { border-color:var(--ink); }
.dur-row { background:var(--bg); border-radius:8px; padding:9px 12px; display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.dur-row span:first-child { font-size:0.6rem; text-transform:uppercase; letter-spacing:.08em; color:var(--mid); }
.dur-row span:last-child { font-family:'Instrument Serif',serif; font-size:1.1rem; }
.btn-log { width:100%; padding:12px; background:var(--ink); color:#fff; border:none; border-radius:10px; font-family:'Instrument Sans',sans-serif; font-size:0.76rem; font-weight:500; cursor:pointer; transition:opacity .15s; }
.btn-log:hover { opacity:.85; }

/* Log list */
.log-item { background:var(--surface); border:1px solid var(--faint); border-radius:12px; padding:12px 14px; margin-bottom:7px; display:flex; align-items:center; gap:10px; animation:fadeUp .2s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.li-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.li-dot.nap { background:var(--nap); } .li-dot.night { background:var(--night); }
.li-body { flex:1; }
.li-type { font-size:0.6rem; text-transform:uppercase; letter-spacing:.08em; color:var(--mid); }
.li-time { font-family:'Instrument Serif',serif; font-size:1rem; color:var(--ink); margin-top:1px; }
.li-dur { font-size:0.72rem; color:var(--mid); background:var(--bg); padding:3px 8px; border-radius:20px; white-space:nowrap; }
.li-acts { display:flex; gap:4px; }
.li-btn { padding:5px 9px; border:1px solid var(--faint); border-radius:6px; background:none; cursor:pointer; font-size:0.7rem; color:var(--mid); font-family:'Instrument Sans',sans-serif; transition:all .15s; }
.li-btn:hover { background:var(--faint); }
.li-btn.del:hover { background:#fee2e2; color:var(--red); border-color:#fecaca; }
.empty { text-align:center; padding:24px 16px; color:var(--mid); font-size:0.8rem; border:1px dashed var(--faint); border-radius:12px; }

/* Modal */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px; opacity:0; pointer-events:none; transition:opacity .2s; }
.overlay.open { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border-radius:18px; padding:22px; width:100%; max-width:340px; transform:translateY(16px); transition:transform .2s; }
.overlay.open .modal { transform:translateY(0); }
.modal h3 { font-family:'Instrument Serif',serif; font-size:1.2rem; margin-bottom:16px; }
.mrow { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.mbtns { display:flex; gap:8px; margin-top:14px; }
.mbtns button { flex:1; padding:11px; border-radius:10px; border:none; cursor:pointer; font-family:'Instrument Sans',sans-serif; font-size:0.76rem; font-weight:500; transition:all .15s; }
.mbtns .ok { background:var(--ink); color:#fff; } .mbtns .ok:hover { opacity:.85; }
.mbtns .cx { background:var(--faint); color:var(--ink); }

/* Toast */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(60px); background:var(--ink); color:#fff; padding:10px 20px; border-radius:100px; font-size:0.74rem; font-weight:500; transition:transform .25s ease; z-index:99; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div class="hdr-name">Rafael <em>Sleep</em></div>
    <div class="hdr-date">
      <div class="hdr-clock" id="clock">--:--:--</div>
      <div id="dateStr">—</div>
    </div>
  </div>

  <!-- Prediction at top -->
  <div class="sh">Tonight's prediction</div>
  <div class="pred-banner empty" id="predBanner">
    <div class="pred-label">No nap logged yet</div>
    <div style="font-size:.8rem">Log today's nap to see bedtime prediction</div>
  </div>

  <!-- Nap window (from last night's wake time) -->
  <div class="nap-win" id="napWin" style="display:none">
    <div>
      <div class="nw-lbl">☀️ Nap window today</div>
      <div class="nw-val" id="napWinVal">—</div>
    </div>
    <div style="font-size:0.7rem;color:#92400e;opacity:.7" id="napWinSub"></div>
  </div>

  <!-- Timer -->
  <div class="sh">Timer</div>
  <div class="timer-card" id="timerCard">
    <div class="ttabs">
      <button class="ttab on-nap"  id="tt-nap"   onclick="setTType('nap')">☀️ Nap</button>
      <button class="ttab"         id="tt-night"  onclick="setTType('night')">🌙 Night</button>
    </div>
    <div class="t-adjust" id="tAdjust">
      <label>Adjust start time</label>
      <input type="time" id="tManualStart" />
    </div>
    <div class="tface">
      <div class="tdigits" id="tdig">
        <span id="th">00</span><span class="colon" id="c1">:</span><span id="tm">00</span><span class="colon" id="c2">:</span><span id="ts">00</span>
      </div>
      <div class="tsince" id="tsince"></div>
    </div>
    <div class="tbtns">
      <button class="btn-go nap" id="btnGo" onclick="toggleTimer()">▶ Start</button>
      <button class="btn-sv" id="btnSv" onclick="saveTimer()">Save ✓</button>
    </div>
  </div>

  <!-- Manual log -->
  <div class="sh">Manual log</div>
  <div class="manual-card">
    <div class="type-row">
      <button class="tpill nap"   id="mp-nap"   onclick="setMType('nap')">☀️ Nap</button>
      <button class="tpill"       id="mp-night"  onclick="setMType('night')">🌙 Night sleep</button>
    </div>
    <div class="frow">
      <div class="field"><label>Date</label><input type="date" id="mDate"/></div>
      <div class="field"><label>Fell asleep</label><input type="time" id="mS" oninput="calcMDur()"/></div>
      <div class="field"><label>Woke up</label><input type="time" id="mE" oninput="calcMDur()"/></div>
    </div>
    <div class="dur-row"><span>Duration</span><span id="mDur">—</span></div>
    <button class="btn-log" onclick="manualLog()">+ Log sleep</button>
  </div>

  <!-- Log -->
  <div class="sh">Today's log</div>
  <div id="logList"></div>

</div>

<!-- Edit modal -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <h3>Edit sleep</h3>
    <div class="mrow">
      <div class="field"><label>Fell asleep</label><input type="time" id="eS" oninput="calcEDur()"/></div>
      <div class="field"><label>Woke up</label><input type="time" id="eE" oninput="calcEDur()"/></div>
    </div>
    <div class="dur-row"><span>Duration</span><span id="eDur">—</span></div>
    <div class="mbtns">
      <button class="cx" onclick="closeEdit()">Cancel</button>
      <button class="ok" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const hist = [
  [75,18.95,677],[70,20.05,635],[71,19.30,637],[86,19.82,674],[73,19.28,625],
  [75,18.78,729],[74,18.98,718],[89,19.42,634],[63,19.42,680],[84,19.18,664],
  [90,19.70,643],[75,19.42,634],[88,19.23,727],[89,19.65,651],[65,19.40,660],
  [87,19.82,641],[82,19.77,656],[64,20.08,616],[80,19.88,607],[90,20.20,648],
  [65,19.52,632],[80,19.20,687],[80,19.80,641],[83,20.47,580],[64,18.50,720],
  [80,19.50,649],[75,20.40,600],[75,19.52,678],
  [110,19.08,715],[143,19.80,686],[91,19.07,661],[133,19.00,688],[108,19.83,619],
  [100,19.68,619],[112,18.93,683],[121,19.00,684],[129,19.62,681],[99,20.13,691],
  [91,19.88,685],[140,19.98,634],[132,20.23,619],[131,19.50,680],[93,20.00,600],
  [133,20.40,626],[95,19.87,638],[95,19.98,607],[99,20.07,624],[100,19.70,665],
  [128,20.12,631],[123,19.47,651],[136,20.27,643],[137,20.02,612],[138,20.15,650],
  [105,19.90,645],[126,20.60,604],[116,20.38,604],[131,20.28,583],[110,20.08,655],[126,20.15,675],
  [157,20.18,639],[161,20.38,637],[170,20.33,590],[170,20.32,611],[154,20.35,651],[158,20.38,589],
];

const KEY = () => new Date().toISOString().split('T')[0];
function yesterday(){ const d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().split('T')[0]; }
// Load today + yesterday (night sleep starts yesterday, ends today)
let log = [
  ...JSON.parse(localStorage.getItem('rafa2_'+KEY())||'[]'),
  ...JSON.parse(localStorage.getItem('rafa2_'+yesterday())||'[]').filter(e=>e.type==='night')
];
let tType='nap', tRunning=false, tStart=null, tStop=null, tTick=null;
let mType='nap', editId=null;

window.onload=()=>{
  setInterval(tickClock,1000); tickClock();
  const n=new Date();
  document.getElementById('mDate').value=KEY();
  document.getElementById('mS').value=p2(n.getHours()-1)+':'+p2(n.getMinutes());
  document.getElementById('mE').value=p2(n.getHours())+':'+p2(n.getMinutes());
  calcMDur(); render(); updatePred(); showNapWin();
};

function tickClock(){
  const n=new Date();
  document.getElementById('clock').textContent=p2(n.getHours())+':'+p2(n.getMinutes())+':'+p2(n.getSeconds());
  const D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dateStr').textContent=D[n.getDay()]+', '+M[n.getMonth()]+' '+n.getDate();
}

// Timer
function setTType(t){
  tType=t;
  document.getElementById('tt-nap').className  ='ttab'+(t==='nap'  ?' on-nap':'');
  document.getElementById('tt-night').className='ttab'+(t==='night'?' on-night':'');
  if(!tRunning) document.getElementById('btnGo').className='btn-go '+t;
}

function toggleTimer(){
  if(!tRunning){
    // Use manual start override if set
    const manualVal = document.getElementById('tManualStart').value;
    if(manualVal){
      const [mh,mm] = manualVal.split(':').map(Number);
      tStart = new Date(); tStart.setHours(mh,mm,0,0);
      // If set time is in the future (user made mistake), clamp to now
      if(tStart > new Date()) tStart = new Date();
    } else {
      tStart = new Date();
    }
    tStop=null; tRunning=true;
    document.getElementById('btnGo').className='btn-go stop';
    document.getElementById('btnGo').textContent='⏹ Stop';
    document.getElementById('btnSv').classList.remove('show');
    document.getElementById('tAdjust').style.display='none';
    document.getElementById('tdig').className='tdigits run-'+tType;
    document.getElementById('timerCard').className='timer-card act-'+tType;
    document.getElementById('c1').className=document.getElementById('c2').className='colon blink';
    document.getElementById('tsince').textContent='Started at '+p2(tStart.getHours())+':'+p2(tStart.getMinutes());
    tTick=setInterval(tickTimer,1000);
  } else {
    clearInterval(tTick); tRunning=false; tStop=new Date();
    document.getElementById('btnGo').className='btn-go '+tType;
    document.getElementById('btnGo').textContent='▶ Restart';
    document.getElementById('btnSv').classList.add('show');
    document.getElementById('tAdjust').style.display='flex';
    document.getElementById('tdig').className='tdigits';
    document.getElementById('timerCard').className='timer-card';
    document.getElementById('c1').className=document.getElementById('c2').className='colon';
    document.getElementById('tsince').textContent='Stopped · '+fmtDur(Math.round((tStop-tStart)/60000));
  }
}

function tickTimer(){
  const s=Math.floor((new Date()-tStart)/1000);
  document.getElementById('th').textContent=p2(Math.floor(s/3600));
  document.getElementById('tm').textContent=p2(Math.floor((s%3600)/60));
  document.getElementById('ts').textContent=p2(s%60);
}

function saveTimer(){
  if(!tStart||!tStop) return;
  const dur=Math.round((tStop-tStart)/60000);
  if(dur<1){toast('Too short!');return;}
  const d=tStart.toISOString().split('T')[0];
  addEntry(tType,d,p2(tStart.getHours())+':'+p2(tStart.getMinutes()),p2(tStop.getHours())+':'+p2(tStop.getMinutes()),dur);
  // reset
  tStart=tStop=null;
  ['th','tm','ts'].forEach(id=>document.getElementById(id).textContent='00');
  document.getElementById('btnGo').className='btn-go '+tType;
  document.getElementById('btnGo').textContent='▶ Start';
  document.getElementById('btnSv').classList.remove('show');
  document.getElementById('tAdjust').style.display='flex';
  document.getElementById('tManualStart').value='';
  document.getElementById('tsince').textContent='';
  document.getElementById('tdig').className='tdigits';
  document.getElementById('timerCard').className='timer-card';
  toast((tType==='nap'?'☀️ Nap':'🌙 Night')+' saved — '+dur+'min');
}

// Manual
function setMType(t){
  mType=t;
  document.getElementById('mp-nap').className  ='tpill'+(t==='nap'  ?' nap':'');
  document.getElementById('mp-night').className='tpill'+(t==='night'?' night':'');
  calcMDur();
}
function calcMDur(){
  const d=getDur('mS','mE');
  document.getElementById('mDur').textContent = d>0 ? fmtDur(d) : '—';
}
function manualLog(){
  const s=document.getElementById('mS').value;
  const e=document.getElementById('mE').value;
  const d=document.getElementById('mDate').value;
  if(!s||!e||!d){ toast('Fill in all fields'); return; }
  const dur=getDur('mS','mE');
  if(dur<1){ toast('End time must be after start'); return; }
  addEntry(mType, d, s, e, dur);
  toast((mType==='nap'?'☀️ Nap':'🌙 Night')+' logged!');
}

// Edit
function openEdit(id){
  const entry=log.find(e=>e.id===id); if(!entry) return;
  editId=id;
  document.getElementById('eS').value=entry.start;
  document.getElementById('eE').value=entry.end;
  calcEDur();
  document.getElementById('editOverlay').classList.add('open');
}
function calcEDur(){ const d=getDur('eS','eE'); document.getElementById('eDur').textContent=d>=0?fmtDur(d):'—'; }
function saveEdit(){
  const idx=log.findIndex(e=>e.id===editId); if(idx<0) return;
  const s=document.getElementById('eS').value, e=document.getElementById('eE').value, dur=getDur('eS','eE');
  if(!s||!e||dur<=0){toast('Check times');return;}
  log[idx].start=s; log[idx].end=e; log[idx].dur=dur;
  save(); render(); updatePred(); showNapWin(); closeEdit(); toast('Updated!');
}
function closeEdit(){ document.getElementById('editOverlay').classList.remove('open'); editId=null; }

// Core
function addEntry(type,date,start,end,dur){
  log.push({id:Date.now(),type,date,start,end,dur});
  save(); render(); updatePred(); showNapWin();
}
function deleteEntry(id){ log=log.filter(e=>e.id!==id); save(); render(); updatePred(); showNapWin(); }
function save(){
  // Group entries by their own date and save each bucket separately
  const byDate = {};
  log.forEach(e=>{
    const d = e.date || KEY();
    if(!byDate[d]) byDate[d]=[];
    byDate[d].push(e);
  });
  Object.entries(byDate).forEach(([date, entries])=>{
    localStorage.setItem('rafa2_'+date, JSON.stringify(entries));
  });
}

function render(){
  const list=document.getElementById('logList');
  // Show: entries dated today, OR night sleeps from yesterday that end today/this morning
  const today=log.filter(e=>{
    if(e.date===KEY()) return true;
    if(e.type==='night' && e.date===yesterday()) return true;
    return false;
  }).sort((a,b)=>a.start.localeCompare(b.start));
  if(!today.length){ list.innerHTML='<div class="empty">Nothing logged yet today</div>'; return; }
  const napTotal   = today.filter(e=>e.type==='nap').reduce((s,e)=>s+e.dur,0);
  const nightTotal = today.filter(e=>e.type==='night').reduce((s,e)=>s+e.dur,0);
  const totalAll   = napTotal + nightTotal;
  const totalsHTML = `
    <div class="totals-bar">
      <div class="tot-item"><div class="tot-lbl">☀️ Nap</div><div class="tot-val">${napTotal>0?fmtDur(napTotal):'—'}</div></div>
      <div class="tot-sep"></div>
      <div class="tot-item"><div class="tot-lbl">🌙 Night</div><div class="tot-val">${nightTotal>0?fmtDur(nightTotal):'—'}</div></div>
      <div class="tot-sep"></div>
      <div class="tot-item"><div class="tot-lbl">Total</div><div class="tot-val">${fmtDur(totalAll)}</div></div>
    </div>`;
  list.innerHTML = totalsHTML + today.map(e=>`
    <div class="log-item">
      <div class="li-dot ${e.type}"></div>
      <div class="li-body">
        <div class="li-type">${e.type==='nap'?'☀️ Nap':'🌙 Night sleep'}</div>
        <div class="li-time">${e.start} → ${e.end}</div>
      </div>
      <span class="li-dur">${fmtDur(e.dur)}</span>
      <div class="li-acts">
        <button class="li-btn" onclick="openEdit(${e.id})">Edit</button>
        <button class="li-btn del" onclick="deleteEntry(${e.id})">✕</button>
      </div>
    </div>`).join('');
}

function showNapWin(){
  const nights=log.filter(e=>e.type==='night').sort((a,b)=>b.start.localeCompare(a.start));
  const el=document.getElementById('napWin');
  if(!nights.length){ el.style.display='none'; return; }
  const wake=nights[0].end;
  const [wh,wm]=wake.split(':').map(Number);
  const wMin=wh*60+wm;
  document.getElementById('napWinVal').textContent=minsToTime(wMin+300)+' – '+minsToTime(wMin+390);
  document.getElementById('napWinSub').textContent='Wake '+wake;
  el.style.display='flex';
}

function updatePred(){
  const naps=log.filter(e=>e.date===KEY()&&e.type==='nap');
  const banner=document.getElementById('predBanner');
  if(!naps.length){
    banner.className='pred-banner empty';
    banner.innerHTML='<div class="pred-label">No nap logged yet</div><div style="font-size:.8rem">Log today\'s nap to see bedtime prediction</div>';
    return;
  }
  const primary=naps.reduce((a,b)=>a.dur>b.dur?a:b);
  const nd=primary.dur;
  let pool=hist.filter(d=>Math.abs(d[0]-nd)<=20);
  if(pool.length<5) pool=hist.filter(d=>Math.abs(d[0]-nd)<=40);
  if(pool.length<3) pool=hist;
  const avgB=pool.reduce((s,d)=>s+d[1],0)/pool.length;
  const avgN=pool.reduce((s,d)=>s+d[2],0)/pool.length;
  const cat=nd<=90?'Short':nd<=150?'Medium':'Long';
  banner.className='pred-banner';
  banner.innerHTML=`
    <div class="pred-label">Based on ${pool.length} similar days · ${nd}min ${cat.toLowerCase()} nap</div>
    <div class="pred-grid">
      <div><div class="pi-lbl">Bedtime</div><div class="pi-val amber">${decToT(avgB-.25)}<br><small style="opacity:.4;font-size:.7rem">–</small><br>${decToT(avgB+.25)}</div></div>
      <div><div class="pi-lbl">Wake up</div><div class="pi-val green">${decToT(avgB+(avgN-20)/60)}<br><small style="opacity:.4;font-size:.7rem">–</small><br>${decToT(avgB+(avgN+20)/60)}</div></div>
      <div><div class="pi-lbl">Night sleep</div><div class="pi-val" style="color:#fff">~${fmtDur(Math.round(avgN))}</div><div style="font-size:.58rem;opacity:.35;margin-top:6px;text-transform:uppercase;letter-spacing:.05em">${cat} nap</div></div>
    </div>`;
}

// Helpers
function getDur(sid,eid){
  const s=document.getElementById(sid).value, e=document.getElementById(eid).value;
  if(!s||!e) return -1;
  const [sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);
  let d=(eh*60+em)-(sh*60+sm); if(d<0) d+=1440; return d;
}
function fmtDur(m){ return Math.floor(m/60)+'h '+(m%60)+'m'; }
function p2(n){ return String(n).padStart(2,'0'); }
function decToT(dec){ dec=((dec%24)+24)%24; return p2(Math.floor(dec))+':'+p2(Math.round((dec%1)*60)); }
function minsToTime(m){ return p2(Math.floor(m/60)%24)+':'+p2(m%60); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
</script>
